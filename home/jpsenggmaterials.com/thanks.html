<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | JPS Engineering Material Pvt Ltd</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .thanks-section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: var(--dark-bg);
        }

        .thanks-card {
            background: var(--card-bg);
            padding: 60px;
            border-radius: 20px;
            border: var(--glass-border);
            max-width: 600px;
            width: 100%;
            box-shadow: var(--glow-primary);
        }

        .thanks-icon {
            font-size: 5rem;
            color: var(--secondary);
            margin-bottom: 30px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>
    <section class="thanks-section">
        <div class="thanks-card">
            <div class="thanks-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <h1>Thank You!</h1>
            <p>Your message has been successfully sent. Our team will get back to you shortly.</p>
            <a href="index.html" class="btn btn-primary">Back to Home</a>
        </div>
    </section>
</body>

</html>
